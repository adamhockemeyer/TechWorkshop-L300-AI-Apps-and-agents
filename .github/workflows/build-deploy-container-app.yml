name: Build and deploy Container App

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
  IMAGE_NAME: techworkshop-l300-ai-agents
  IMAGE_TAG: ${{ github.sha }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_URI=${REGISTRY_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}
          docker build \
            --file src/Dockerfile \
            --tag ${IMAGE_URI} \
            src
          docker push ${IMAGE_URI}
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV

      - name: Install Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Deploy image to Azure Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_URI" \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ secrets.gpt_endpoint }}" \
              embedding_endpoint="${{ secrets.embedding_endpoint }}" \
              phi_4_endpoint="${{ secrets.phi_4_endpoint }}"
